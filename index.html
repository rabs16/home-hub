<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#111;font-size:15px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden;position:relative}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;padding:1rem 0}
.sidebar-title{font-size:12px;font-weight:600;color:#888;padding:0 1rem 0.75rem;letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:.55rem 1rem;cursor:pointer;font-size:14px;color:#666;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:#f8f8f8;color:#111}
.nav-item.active{color:#111;border-left-color:#333;background:#f8f8f8;font-weight:500}
.nav-item i{font-size:17px}
.nav-divider{height:1px;background:#eee;margin:.5rem 0}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #eee;padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:.4rem .85rem;font-size:13px;border:1px solid #ccc;border-radius:8px;background:transparent;cursor:pointer;color:#111;transition:background .15s}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#111;color:#fff;border-color:transparent}
.btn-primary:hover{background:#333}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.task-block{background:#fff;border:1px solid #eee;border-radius:12px;margin-bottom:1rem;overflow:hidden}
.task-block-header{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
.tier-label{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.tier-dot{width:8px;height:8px;border-radius:50%}
.dot-red{background:#E24B4A}.dot-amber{background:#EF9F27}.dot-blue{background:#378ADD}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 1rem;border-bottom:1px solid #f5f5f5;transition:background .12s}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:#fafafa}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #ccc;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:#111;border-color:#111}
.task-check.done::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px}
.task-title.done{text-decoration:line-through;color:#aaa}
.task-meta{font-size:12px;color:#888;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.task-tag{background:#f2f2f2;border-radius:4px;padding:1px 6px;font-size:11px;color:#666}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.task-item:hover .task-actions{opacity:1}
.icon-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#888;font-size:15px}
.icon-btn:hover{background:#eee;color:#111}
.add-task-row{padding:.5rem 1rem;display:flex;gap:8px;align-items:center;border-top:1px solid #f5f5f5}
.add-task-input{flex:1;border:none;background:transparent;font-size:13px;color:#111;outline:none}
.add-task-input::placeholder{color:#ccc}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:11px;font-weight:500}
.badge-red{background:#FCEBEB;color:#A32D2D}.badge-amber{background:#FAEEDA;color:#854F0B}.badge-blue{background:#E6F1FB;color:#185FA5}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1rem}
.profile-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem 1.25rem}
.profile-card label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;display:block;margin-bottom:.4rem}
.profile-card input,.profile-card select,.profile-card textarea{width:100%;border:none;background:transparent;font-size:14px;color:#111;outline:none;font-family:inherit;resize:none}
.profile-card textarea{min-height:60px}
.log-item{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;gap:1rem;align-items:flex-start}
.log-date{font-size:12px;color:#888;flex-shrink:0;width:80px;padding-top:2px}
.log-body{flex:1}
.log-title{font-size:14px;font-weight:500}
.log-detail{font-size:13px;color:#888;margin-top:2px}
.log-cost{font-size:12px;background:#EAF3DE;color:#3B6D11;border-radius:4px;padding:1px 7px;display:inline-block;margin-top:4px}
.seasonal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem}
.season-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem}
.season-name{font-size:13px;font-weight:500;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.season-item{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer}
.season-item.checked{color:#aaa;text-decoration:line-through}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.5rem;width:380px;max-width:90%}
.modal h2{font-size:15px;font-weight:500;margin-bottom:1rem}
.modal-field{margin-bottom:1rem}
.modal-field label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888;display:block;margin-bottom:.3rem}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:.5rem .75rem;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none}
.modal-field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.status-bar{font-size:12px;color:#888;padding:.3rem 1.5rem;background:#fff;border-bottom:1px solid #eee;height:30px;display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#3B6D11;flex-shrink:0}
.empty{padding:1rem;font-size:13px;color:#aaa}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#888}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading-screen">Loading your home hub…</div></div>
<script>
const API = '/api/db';
let currentTab = 'tasks', modal = null, profileTimer = null;
let data = { tasks:[], profile:{}, log:[], seasonal:[] };

async function api(action, payload) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, payload })
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

let statusTimer = null;
function setStatus(s, msg) {
  const dot = document.getElementById('sdot'), bar = document.getElementById('smsg');
  if (!dot || !bar) return;
  clearTimeout(statusTimer);
  if (s === 'saving') { dot.style.background='#EF9F27'; bar.textContent='Saving...'; }
  else if (s === 'saved') { dot.style.background='#3B6D11'; bar.textContent='All changes saved'; statusTimer=setTimeout(()=>setStatus('ok'),3000); }
  else if (s === 'error') { dot.style.background='#E24B4A'; bar.textContent=msg||'Error saving'; }
  else { dot.style.background='#3B6D11'; bar.textContent='Connected'; }
}

async function loadAll() {
  const d = await api('get_all');
  data.tasks = d.tasks || [];
  data.profile = d.profile || {};
  data.log = d.log || [];
  data.seasonal = d.seasonal || [];
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderShell() {
  const tabs = {tasks:'Tasks',profile:'Home Profile',log:'Work Log',seasonal:'Seasonal'};
  const icons = {tasks:'ti-checklist',profile:'ti-home-2',log:'ti-history',seasonal:'ti-calendar-event'};
  const actions = currentTab==='tasks' ? '<button class="btn btn-primary" onclick="openAddTask()"><i class="ti ti-plus"></i> Add task</button>'
    : currentTab==='log' ? '<button class="btn btn-primary" onclick="openAddLog()"><i class="ti ti-plus"></i> Log work</button>' : '';
  document.getElementById('app').innerHTML = `
  <aside class="sidebar">
    <div class="sidebar-title">Home Hub</div>
    ${Object.entries(tabs).map(([k,v])=>`<div class="nav-item ${currentTab===k?'active':''}" onclick="switchTab('${k}')"><i class="ti ${icons[k]}"></i>${v}</div>`).join('')}
  </aside>
  <div class="main">
    <div class="topbar"><h1>${tabs[currentTab]}</h1><div>${actions}</div></div>
    <div class="status-bar"><div class="status-dot" id="sdot"></div><span id="smsg">Connected</span></div>
    <div class="content" id="content"></div>
  </div>`;
  renderTab();
}

function switchTab(tab) { currentTab=tab; renderShell(); }

function renderTab() {
  const c = document.getElementById('content');
  if (!c) return;
  if (currentTab==='tasks') renderTasks(c);
  else if (currentTab==='profile') renderProfile(c);
  else if (currentTab==='log') renderLog(c);
  else if (currentTab==='seasonal') renderSeasonal(c);
}

function renderTasks(c) {
  const tiers = [
    {key:'short',label:'Short term',dot:'dot-red',badge:'badge-red',hint:'Next 30 days'},
    {key:'medium',label:'Medium term',dot:'dot-amber',badge:'badge-amber',hint:'1–6 months'},
    {key:'long',label:'Long term',dot:'dot-blue',badge:'badge-blue',hint:'6+ months'},
  ];
  c.innerHTML = tiers.map(tier => {
    const tasks = data.tasks.filter(t=>t.tier===tier.key);
    const count = tasks.filter(t=>!t.done).length;
    return `<div class="task-block">
      <div class="task-block-header">
        <span class="tier-label"><span class="tier-dot ${tier.dot}"></span>${tier.label}</span>
        <span style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:#aaa">${tier.hint}</span><span class="badge ${tier.badge}">${count}</span></span>
      </div>
      ${tasks.length===0?'<div class="empty">No tasks yet.</div>':tasks.map(t=>`
      <div class="task-item">
        <div class="task-check ${t.done?'done':''}" onclick="toggleDone(${t.id},${!t.done})"></div>
        <div class="task-body">
          <div class="task-title ${t.done?'done':''}">${esc(t.title)}</div>
          <div class="task-meta">
            ${t.category?`<span class="task-tag">${esc(t.category)}</span>`:''}
            ${t.cost?`<span class="task-tag">💰 ${esc(t.cost)}</span>`:''}
            ${t.notes?`<span style="color:#bbb;font-size:11px">${esc(t.notes)}</span>`:''}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="openEditTask(${t.id})"><i class="ti ti-edit"></i></button>
          <button class="icon-btn" onclick="doDeleteTask(${t.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('')}
      <div class="add-task-row">
        <i class="ti ti-plus" style="font-size:14px;color:#ccc"></i>
        <input class="add-task-input" placeholder="Quick add…" onkeydown="if(event.key==='Enter')quickAdd(this,'${tier.key}')">
      </div>
    </div>`;
  }).join('');
}

function renderProfile(c) {
  const p = data.profile;
  const pf=(label,key,val,ph)=>`<div class="profile-card"><label>${label}</label><input value="${esc(val||'')}" placeholder="${ph}" oninput="dpf('${key}',this.value)"></div>`;
  const ps=(label,key,opts,val)=>`<div class="profile-card"><label>${label}</label><select onchange="dpf('${key}',this.value)">${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  c.innerHTML = `
  <div class="profile-grid">
    ${pf('Address','address',p.address,'e.g. 14 Maple St, Boston MA')}
    ${ps('Home type','home_type',['Single family','Condo/Townhouse','Multi-family','Other'],p.home_type)}
    ${pf('Year built','year_built',p.year_built,'e.g. 1987')}
    ${pf('Square footage','sqft',p.sqft,'e.g. 2,400 sq ft')}
    ${pf('Bedrooms','bedrooms',p.bedrooms,'')}
    ${pf('Bathrooms','bathrooms',p.bathrooms,'')}
    ${pf('Roof type & age','roof',p.roof,'e.g. Asphalt shingle, 2016')}
    ${pf('HVAC system','hvac',p.hvac,'e.g. Carrier gas furnace, 2019')}
    ${pf('Water heater','water_heater',p.water_heater,'e.g. Rheem 50gal, 2020')}
  </div>
  <div class="profile-card" style="margin-bottom:1rem">
    <label>Major appliances & model numbers</label>
    <textarea oninput="dpf('appliances',this.value)" placeholder="e.g. Washer: LG WM3400CW (2021)…">${esc(p.appliances||'')}</textarea>
  </div>
  <div class="profile-card">
    <label>Other notes</label>
    <textarea oninput="dpf('notes',this.value)" placeholder="Quirks, HOA rules, anything useful…">${esc(p.notes||'')}</textarea>
  </div>`;
}

function dpf(key, val) {
  data.profile[key] = val;
  clearTimeout(profileTimer);
  profileTimer = setTimeout(async () => {
    setStatus('saving');
    try { await api('upsert_profile', {key, value: val}); setStatus('saved'); }
    catch(e) { setStatus('error'); }
  }, 800);
}

function renderLog(c) {
  if (!data.log.length) { c.innerHTML='<div class="empty">No work logged yet.</div>'; return; }
  c.innerHTML = data.log.map(l=>`
  <div class="log-item">
    <div class="log-date">${esc(l.log_date||'')}</div>
    <div class="log-body">
      <div class="log-title">${esc(l.title)}</div>
      <div class="log-detail">${l.contractor?esc(l.contractor):''}${l.notes?' · '+esc(l.notes):''}</div>
      ${l.cost?`<span class="log-cost">${esc(l.cost)}</span>`:''}
    </div>
    <button class="icon-btn" onclick="doDeleteLog(${l.id})"><i class="ti ti-trash"></i></button>
  </div>`).join('');
}

function renderSeasonal(c) {
  const seasons = [
    {key:'spring',label:'Spring',icon:'ti-leaf',color:'#3B6D11'},
    {key:'summer',label:'Summer',icon:'ti-sun',color:'#854F0B'},
    {key:'fall',label:'Fall',icon:'ti-wind',color:'#A32D2D'},
    {key:'winter',label:'Winter',icon:'ti-snowflake',color:'#185FA5'},
  ];
  c.innerHTML = `<div class="seasonal-grid">${seasons.map(s=>`
  <div class="season-card">
    <div class="season-name" style="color:${s.color}"><i class="ti ${s.icon}"></i>${s.label}</div>
    ${data.seasonal.filter(i=>i.season===s.key).map(item=>`
    <div class="season-item ${item.done?'checked':''}" onclick="doToggleSeasonal(${item.id},${!item.done})">
      <i class="ti ${item.done?'ti-circle-check':'ti-circle'}" style="color:${item.done?s.color:'#ccc'}"></i>
      ${esc(item.label)}
    </div>`).join('')}
  </div>`).join('')}
  </div>`;
}

async function toggleDone(id, done) {
  const t = data.tasks.find(t=>t.id===id);
  if (t) t.done = done;
  renderTab();
  setStatus('saving');
  try { await api('update_task', {id, done}); setStatus('saved'); }
  catch(e) { setStatus('error'); }
}

async function doDeleteTask(id) {
  data.tasks = data.tasks.filter(t=>t.id!==id);
  renderTab();
  await api('delete_task', {id});
}

async function doDeleteLog(id) {
  data.log = data.log.filter(l=>l.id!==id);
  renderTab();
  await api('delete_log', {id});
}

async function doToggleSeasonal(id, done) {
  const item = data.seasonal.find(s=>s.id===id);
  if (item) item.done = done;
  renderTab();
  await api('toggle_seasonal', {id, done});
}

async function quickAdd(input, tier) {
  const title = input.value.trim();
  if (!title) return;
  input.value = '';
  setStatus('saving');
  try {
    const row = await api('add_task', {title, tier, category:'', cost:'', notes:''});
    data.tasks.push(row);
    setStatus('saved');
    renderTab();
  } catch(e) { setStatus('error'); }
}

function openAddTask() {
  showModal(`<h2>Add task</h2>
    <div class="modal-field"><label>Task</label><input id="mt" placeholder="What needs to be done?"></div>
    <div class="modal-field"><label>Tier</label><select id="mtr"><option value="short">Short term</option><option value="medium">Medium term</option><option value="long">Long term</option></select></div>
    <div class="modal-field"><label>Category</label><input id="mc" placeholder="e.g. Plumbing, Electrical…"></div>
    <div class="modal-field"><label>Estimated cost</label><input id="mco" placeholder="e.g. ~$200"></div>
    <div class="modal-field"><label>Notes</label><textarea id="mn" placeholder="Details, links…"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewTask()">Add task</button></div>`);
}

async function saveNewTask() {
  const title = document.getElementById('mt').value.trim();
  if (!title) return;
  setStatus('saving');
  try {
    const row = await api('add_task', {title, tier:document.getElementById('mtr').value, category:document.getElementById('mc').value, cost:document.getElementById('mco').value, notes:document.getElementById('mn').value});
    data.tasks.push(row);
    setStatus('saved');
    closeModal();
    renderTab();
  } catch(e) { setStatus('error'); }
}

function openEditTask(id) {
  const t = data.tasks.find(t=>t.id===id); if (!t) return;
  showModal(`<h2>Edit task</h2>
    <div class="modal-field"><label>Task</label><input id="mt" value="${esc(t.title)}"></div>
    <div class="modal-field"><label>Tier</label><select id="mtr"><option value="short" ${t.tier==='short'?'selected':''}>Short term</option><option value="medium" ${t.tier==='medium'?'selected':''}>Medium term</option><option value="long" ${t.tier==='long'?'selected':''}>Long term</option></select></div>
    <div class="modal-field"><label>Category</label><input id="mc" value="${esc(t.category||'')}"></div>
    <div class="modal-field"><label>Cost</label><input id="mco" value="${esc(t.cost||'')}"></div>
    <div class="modal-field"><label>Notes</label><textarea id="mn">${esc(t.notes||'')}</textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditTask(${id})">Save</button></div>`);
}

async function saveEditTask(id) {
  const updates = {id, title:document.getElementById('mt').value, tier:document.getElementById('mtr').value, category:document.getElementById('mc').value, cost:document.getElementById('mco').value, notes:document.getElementById('mn').value};
  setStatus('saving');
  try {
    const row = await api('update_task', updates);
    const i = data.tasks.findIndex(t=>t.id===id);
    if (i>=0) data.tasks[i] = row;
    setStatus('saved');
    closeModal();
    renderTab();
  } catch(e) { setStatus('error'); }
}

function openAddLog() {
  const today = new Date().toISOString().slice(0,7);
  showModal(`<h2>Log completed work</h2>
    <div class="modal-field"><label>What was done</label><input id="lt" placeholder="e.g. Replaced water heater"></div>
    <div class="modal-field"><label>Date</label><input id="ld" type="month" value="${today}"></div>
    <div class="modal-field"><label>Done by</label><input id="lc" placeholder="e.g. DIY, Mike's HVAC"></div>
    <div class="modal-field"><label>Cost</label><input id="lco" placeholder="e.g. $850"></div>
    <div class="modal-field"><label>Notes</label><textarea id="ln" placeholder="Model numbers, warranty info…"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLog()">Save entry</button></div>`);
}

async function saveLog() {
  const title = document.getElementById('lt').value.trim(); if (!title) return;
  setStatus('saving');
  try {
    const row = await api('add_log', {title, log_date:document.getElementById('ld').value, contractor:document.getElementById('lc').value, cost:document.getElementById('lco').value, notes:document.getElementById('ln').value});
    data.log.unshift(row);
    setStatus('saved');
    closeModal();
    renderTab();
  } catch(e) { setStatus('error'); }
}

function showModal(html) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.addEventListener('click', e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov); modal=ov;
  const f = ov.querySelector('input,textarea,select');
  if (f) setTimeout(()=>f.focus(),50);
}
function closeModal() { if(modal){modal.remove();modal=null;} }

async function init() {
  try {
    await loadAll();
    renderShell();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading-screen" style="flex-direction:column;gap:1rem"><div>Could not connect to database.</div><div style="font-size:12px;color:#aaa">${e.message}</div></div>`;
  }
}
init();
</script>
</body>
</html>
